name: Feature request
description: Propose a focused improvement with clear governance boundaries
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Vault is a local-first, candidate-first memory governance layer. Please describe the user problem before proposing a backend or framework.
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Who needs this, and what cannot they do today?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What observable result would count as done?
    validations:
      required: true
  - type: dropdown
    id: boundary
    attributes:
      label: Main area
      options:
        - Local CLI or SQLite
        - MCP integration
        - Memory governance or review
        - Gateway or remote read
        - Supabase or central memory
        - Semantic retrieval
        - Obsidian
        - Documentation or onboarding
        - Contributor experience
        - Other
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Privacy and authority impact
      description: Could this change permissions, private reads, active-memory writes, external data transfer, or source-of-truth behavior?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Smallest useful version
      description: Describe the smallest low-risk implementation and any alternatives considered.
  - type: checkboxes
    id: release_boundary
    attributes:
      label: Release boundary
      options:
        - label: This request does not assume multi-master, Vault Cloud, or direct remote active-memory writes unless explicitly justified.
          required: true
