name: Bug report
description: Report a reproducible problem in Vault Agent Memory
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Vault Agent Memory. Never include real secrets, patient data, customer data, private memory content, or production database files.
  - type: input
    id: version
    attributes:
      label: Vault version
      description: Run `vault --version`.
      placeholder: vault-for-llm 0.10.1
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - CLI
        - MCP
        - Gateway / Remote Server
        - SQLite / migration
        - Supabase / central memory
        - Semantic search
        - Obsidian import or export
        - Documentation or installer
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Provide sanitized commands or code and the smallest reproducible project.
      render: shell
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Sanitized output
      description: Remove tokens, paths containing personal names, raw memory, and private project data.
      render: text
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets and private or identifying data.
          required: true
        - label: I confirmed whether this also occurs on the latest published version.
          required: true
