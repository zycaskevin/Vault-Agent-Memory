name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "README.md"
      - "docs/**"
      - "site/**"
      - "benchmarks/results/**"
      - "scripts/build_benchmark_site_data.py"
      - "scripts/run_external_reproduction.py"
      - "scripts/validate_external_reproduction.py"
      - "tests/test_benchmark_site.py"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy evidence website
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare static site
        run: |
          set -euo pipefail
          site_dir="${RUNNER_TEMP}/site"
          python scripts/build_benchmark_site_data.py
          cp -R site "${site_dir}"
          evidence="${site_dir}/evidence/vaultgovbench-retrieval-v0.1/89b9156"
          mkdir -p "${evidence}"
          cp -R benchmarks/results/vaultgovbench-retrieval-v0.1/89b9156/. "${evidence}/"

      - name: Verify website contract
        run: python tests/test_benchmark_site.py

      - name: Upload static site
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ runner.temp }}/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
